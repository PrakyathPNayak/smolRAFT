server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /ws {
        proxy_pass http://gateway:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /api/ {
        proxy_pass http://gateway:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Per-replica status endpoints for the live dashboard
    location /replica/1/status {
        proxy_pass http://replica1:9001/status;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /replica/2/status {
        proxy_pass http://replica2:9002/status;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /replica/3/status {
        proxy_pass http://replica3:9003/status;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /replica/4/status {
        proxy_pass http://replica4:9004/status;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
